<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度なWebプロキシ (Rammerhead)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #d93025; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #d93025;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        button:hover { background-color: #a52714; }
        .note {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #666;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #d93025; }
    </style>
</head>
<body>
    <div class="container">
        <h1>高度なWebプロキシ</h1>
        <div id="loginSection">
            <input type="password" id="password" placeholder="アクセスパスワードを入力">
            <button onclick="login()">ログイン</button>
        </div>
        <div id="proxySection" style="display:none;">
            <input type="text" id="url" placeholder="https://gemini.google.com" onkeydown="if(event.key==='Enter')launch()">
            <button onclick="launch()">閲覧を開始する</button>
            <div id="status"></div>
        </div>
        <div class="note">
            <p><strong>【Rammerheadエンジン】</strong></p>
            <ul>
                <li>高度なブラウザエミュレーションにより、Gemini等に対応。</li>
                <li>セッションベースの強力なプロキシ機能。</li>
            </ul>
        </div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            if (res.ok) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('proxySection').style.display = 'block';
                document.getElementById('status').textContent = '準備完了！URLを入力してください。';
            } else {
                alert('パスワードが違います');
            }
        }

        async function launch() {
            const urlInput = document.getElementById('url').value;
            if (!urlInput) return;

            let target = urlInput.trim();
            if (!target.includes('.')) {
                target = 'https://www.google.com/search?q=' + encodeURIComponent(target);
            } else if (!target.startsWith('http')) {
                target = 'https://' + target;
            }

            document.getElementById('status').textContent = 'セッションを作成中...';

            try {
                // Rammerheadのセッション作成
                const res = await fetch('/ram/session/new', { method: 'POST' });
                const sessionId = await res.text();
                
                // セッションを使用してリダイレクト
                window.location.href = '/ram/' + sessionId + '/' + target;
            } catch (err) {
                document.getElementById('status').textContent = 'エラー: ' + err.message;
            }
        }
    </script>
</body>
</html>
